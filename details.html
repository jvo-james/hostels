  <style>
    .details-shell {
      padding: 28px 0 80px;
    }

    .details-crumbs {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      font-size: 0.92rem;
      color: var(--muted);
      margin-bottom: 18px;
    }

    .details-crumbs a {
      color: var(--green-2);
      font-weight: 800;
    }

    .details-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.25fr) 380px;
      gap: 24px;
      align-items: start;
    }

    .details-main,
    .details-aside {
      display: grid;
      gap: 20px;
    }

    .details-card {
      background: rgba(255, 255, 255, 0.94);
      border: 1px solid rgba(16, 33, 26, 0.08);
      border-radius: 28px;
      box-shadow: var(--shadow-sm);
      overflow: hidden;
    }

    .details-hero {
      position: relative;
      min-height: 420px;
      display: grid;
      align-items: end;
      background: #dfeee5;
    }

    .details-hero img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      position: absolute;
      inset: 0;
    }

    .details-hero-overlay {
      position: relative;
      z-index: 1;
      padding: 24px;
      background: linear-gradient(180deg, rgba(10, 21, 16, 0.00) 0%, rgba(10, 21, 16, 0.68) 100%);
      color: #fff;
    }

    .details-badges {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .details-badge {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 7px 12px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.16);
      border: 1px solid rgba(255, 255, 255, 0.18);
      backdrop-filter: blur(8px);
      font-weight: 800;
      font-size: 0.85rem;
    }

    .details-badge.gold {
      background: rgba(200, 155, 60, 0.95);
      color: #fff;
      border-color: transparent;
    }

    .details-title {
      margin: 0;
      font-family: "Playfair Display", Georgia, serif;
      font-size: clamp(2rem, 1.5rem + 1.6vw, 3.4rem);
      line-height: 0.96;
      letter-spacing: -0.04em;
      max-width: 12ch;
    }

    .details-subtitle {
      margin: 12px 0 0;
      font-size: 1rem;
      color: rgba(255, 255, 255, 0.84);
      max-width: 62ch;
    }

    .details-topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-bottom: 18px;
    }

    .details-topbar .left,
    .details-topbar .right {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .details-rating {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(27, 67, 50, 0.08);
      color: var(--green);
      font-weight: 800;
    }

    .details-fav-btn {
      width: 44px;
      height: 44px;
      border-radius: 999px;
      border: 1.5px solid rgba(16, 33, 26, 0.10);
      background: #fff;
      color: #b63e4b;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 14px 24px rgba(16, 33, 26, 0.10);
      cursor: pointer;
    }

    .details-body {
      padding: 24px;
    }

    .details-section {
      padding-top: 20px;
      margin-top: 20px;
      border-top: 1px solid rgba(16, 33, 26, 0.08);
    }

    .details-section:first-child {
      padding-top: 0;
      margin-top: 0;
      border-top: 0;
    }

    .details-section h2,
    .details-section h3 {
      margin: 0 0 12px;
    }

    .details-section h2 {
      font-size: 1.08rem;
    }

    .details-section p {
      margin: 0;
      color: var(--muted);
      line-height: 1.7;
    }

    .stats-row {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      margin-top: 18px;
    }

    .stat-box {
      border-radius: 22px;
      background: rgba(27, 67, 50, 0.05);
      border: 1px solid rgba(16, 33, 26, 0.08);
      padding: 14px;
    }

    .stat-box .label {
      display: block;
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .stat-box strong {
      font-size: 1.05rem;
      color: var(--text);
    }

    .room-grid,
    .review-list {
      display: grid;
      gap: 10px;
    }

    .amenity-grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .amenity-pill,
    .room-pill {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      padding: 12px 14px;
      border-radius: 18px;
      border: 1px solid rgba(16, 33, 26, 0.10);
      background: #fff;
      color: var(--text);
      font-weight: 700;
    }

    .room-pill {
      justify-content: space-between;
    }

    .room-pill span:last-child {
      color: var(--green);
      font-weight: 800;
      white-space: nowrap;
    }

    .review-card {
      border-radius: 22px;
      background: rgba(27, 67, 50, 0.04);
      border: 1px solid rgba(16, 33, 26, 0.08);
      padding: 14px 16px;
    }

    .review-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 8px;
    }

    .review-top strong {
      font-size: 0.98rem;
    }

    .review-top span {
      color: var(--gold);
      font-weight: 800;
      font-size: 0.92rem;
    }

    .review-card p {
      margin: 0;
      color: var(--muted);
      line-height: 1.65;
    }

    .aside-card {
      padding: 22px;
    }

    .price-card {
      background: linear-gradient(145deg, rgba(27, 67, 50, 0.98), rgba(45, 106, 79, 0.94));
      color: #fff;
    }

    .price-card .eyebrow,
    .price-card p,
    .price-card .muted,
    .price-card .mini-note {
      color: rgba(255, 255, 255, 0.80);
    }

    .price-amount {
      font-family: "Playfair Display", Georgia, serif;
      font-size: 2.35rem;
      line-height: 1;
      margin: 8px 0 6px;
      color: #fff;
    }

    .action-stack {
      display: grid;
      gap: 10px;
      margin-top: 18px;
    }

    .btn-full {
      width: 100%;
      justify-content: center;
    }

    .contact-box {
      display: grid;
      gap: 10px;
      padding: 16px;
      border-radius: 22px;
      background: rgba(27, 67, 50, 0.05);
      border: 1px solid rgba(16, 33, 26, 0.08);
    }

    .contact-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .contact-row strong {
      color: var(--text);
    }

    .contact-row a,
    .contact-row span {
      color: var(--green-2);
      font-weight: 800;
    }

    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      margin-top: 12px;
    }

    .gallery-grid img {
      width: 100%;
      aspect-ratio: 1 / 0.82;
      object-fit: cover;
      border-radius: 18px;
      border: 1px solid rgba(16, 33, 26, 0.08);
    }

    .not-found {
      padding: 80px 24px;
      text-align: center;

      margin: 18px 0 8px;
      font-family: "Playfair Display", Georgia, serif;
      font-size: clamp(2rem, 1.4rem + 1.4vw, 3rem);
    }

    .not-found p {
      margin: 0 auto 22px;
      max-width: 60ch;
      color: var(--muted);
      line-height: 1.7;

      .details-aside {
        grid-template-columns: 1fr;
      }

      .details-topbar {
        align-items: flex-start;
        flex-direction: column;
      }
    }

            <div class="details-topbar">
              <div class="left">
                <span class="details-rating"><i class="fa-solid fa-star"></i> ${hostel.rating.toFixed(1)} • ${hostel.reviews} reviews</span>
                <span class="details-rating"><i class="fa-solid fa-walkie-talkie"></i> ${hostel.distance.toFixed(1)} km from UCC</span>
              </div>
              <div class="right">
                <button class="details-fav-btn" type="button" id="favBtn" aria-label="Save hostel" aria-pressed="${isSaved()}">
                  <i class="${isSaved() ? "fa-solid" : "fa-regular"} fa-heart"></i>
                </button>
              </div>
            </div>

            <section class="details-section">
              <h2>About this hostel</h2>
              <p>${hostel.description}</p>

              <div class="stats-row">
                <div class="stat-box"><span class="label">Price</span><strong>${formatMoney(hostel.price)}</strong></div>
                <div class="stat-box"><span class="label">Location</span><strong>${hostel.area}</strong></div>
                <div class="stat-box"><span class="label">Distance</span><strong>${hostel.distance.toFixed(1)} km</strong></div>
                <div class="stat-box"><span class="label">Rating</span><strong>${hostel.rating.toFixed(1)} / 5</strong></div>
              </div>
            </section>

            <section class="details-section">
              <h2>Amenities</h2>
              <div class="amenity-grid">
                ${hostel.amenities.map((item) => `<span class="amenity-pill"><i class="fa-solid fa-circle-check"></i> ${item}</span>`).join("")}
              </div>
            </section>

            <section class="details-section">
              <h2>Room options</h2>
              <div class="room-grid">
                ${hostel.rooms.map((room) => `<div class="room-pill"><span>${room.title}</span><span>${room.price}</span></div>`).join("")}
              </div>
            </section>

            <section class="details-section">
              <h2>Gallery</h2>
              <div class="gallery-grid">
                ${hostel.gallery.map((src) => `<img src="${src}" alt="${hostel.name} gallery image" />`).join("")}
              </div>
            </section>

            <section class="details-section">
              <h2>Reviews</h2>
              <div class="review-list">
                ${hostel.reviewsList.map((review) => `
                  <div class="review-card">
                    <div class="review-top">
                      <strong>${review.name}</strong>
                      <span>${renderStars(review.rating)} ${review.rating.toFixed(0)}</span>
                    </div>
                    <p>${review.text}</p>
                  </div>
                `).join("")}
              </div>
            </section>
          </article>
        </section>

        <aside class="details-aside">
          <article class="details-card aside-card price-card">
            <span class="eyebrow">Semester price</span>
            <div class="price-amount">${formatMoney(hostel.price)}</div>
            <p class="mini-note">Per semester • ${hostel.type} • ${hostel.area}</p>

            <div class="action-stack">
              <a class="btn btn-primary btn-full" href="bookings.html">Book now</a>
              <a class="btn btn-secondary btn-full" href="messages.html">Message owner</a>
            </div>
          </article>

          <article class="details-card aside-card">
            <h3>Contact</h3>
            <div class="contact-box">
              <div class="contact-row"><strong>Phone</strong><a href="tel:${hostel.phone}">${hostel.phone}</a></div>
              <div class="contact-row"><strong>WhatsApp</strong><a href="https://wa.me/${hostel.whatsapp.replace(/\D/g, "")}" target="_blank" rel="noreferrer">Chat now</a></div>
              <div class="contact-row"><strong>Facebook</strong><span>${hostel.facebook}</span></div>
              <div class="contact-row"><strong>Instagram</strong><span>@${hostel.instagram}</span></div>
            </div>
          </article>

          <article class="details-card aside-card">
            <h3>Quick facts</h3>
            <div class="contact-box">
              <div class="contact-row"><strong>Room type</strong><span>${hostel.type}</span></div>
              <div class="contact-row"><strong>Distance</strong><span>${hostel.distance.toFixed(1)} km</span></div>
              <div class="contact-row"><strong>Rating</strong><span>${hostel.rating.toFixed(1)} / 5</span></div>
              <div class="contact-row"><strong>Reviews</strong><span>${hostel.reviews}</span></div>
            </div>
          </article>
        </aside>
      `;

      document.getElementById("favBtn")?.addEventListener("click", toggleSaved);
    };

    // Simple header menu support for small screens
    const menuToggle = document.querySelector(".menu-toggle");
    const siteNav = document.querySelector(".site-nav");
    const headerActions = document.querySelector(".header-actions");

    if (menuToggle && siteNav) {
      menuToggle.addEventListener("click", () => {
        const isOpen = siteNav.classList.contains("open");
        siteNav.classList.toggle("open", !isOpen);
        headerActions?.classList.toggle("open", !isOpen);
        menuToggle.setAttribute("aria-expanded", String(!isOpen));
      });
    }

    // Update the page title even if no hostel ID is found.
    render();
  </script>
</body>
</html>
